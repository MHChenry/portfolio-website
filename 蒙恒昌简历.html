    return { value: out, v: velRef.v };
  }

  /** 向定长缓冲区添加值 */
  function medianPush(buf, v, maxLen) {
    buf.push(v);
    if (buf.length > maxLen) buf.shift();
  }

  /** 计算缓冲区中位数 */
  function median(buf) {
    if (buf.length === 0) return 0;
    var a = [].concat(buf).sort(function(x, y) { return x - y; });
    var mid = Math.floor(a.length / 2);
    return a.length % 2 ? a[mid] : (a[mid - 1] + a[mid]) * 0.5;
  }

  /** 计算点集质心 */
  function centroid(points) {
    var x = 0, y = 0;
    var n = points.length || 1;
    for (var i = 0; i < points.length; i++) {
      x += points[i].x;
      y += points[i].y;
    }
    return { x: x / n, y: y / n };
  }

  /** 两点距离 */
  function dist2(a, b) {
    return Math.hypot(a.x - b.x, a.y - b.y);
  }

  // ── 配置 ────────────────────────────────
  var PARTICLE_COUNT = Math.min(150, Math.floor(W * H / 6000));
  var CONNECT_DIST    = 150;
  var MOUSE_RADIUS    = 220;
  var COLORS = [
    '167,139,250', '196,181,253', '139,92,246',
    '99,102,241',  '129,140,248', '221,214,254',
    '192,132,252', '165,180,252'
  ];

  // ── 鼠标状态（中值滤波平滑）─────────────
  var mouseXBuf = [], mouseYBuf = [];
  var MEDIAN_WINDOW = 7;
  var mouse = { x: -600, y: -600, px: -600, py: -600, vx: 0, vy: 0 };
  var mouseTrail = [];
  var TRAIL_MAX = 16;

  // ── 触控质心 ────────────────────────────
  var touches = [];

  // ── 涟漪 ────────────────────────────────
  var ripples = [];

  // ── 粒子类（弹簧回归原位）───────────────
  function Particle(doInit) {
    // 每个粒子有自己的"家"
    this.homeX = 0;
    this.homeY = 0;
    this.x = 0;
    this.y = 0;
    this.vxRef = { v: 0 };
    this.vyRef = { v: 0 };
    this.size   = 0.5 + Math.random() * 2.2;
    this.baseA  = 0.08 + Math.random() * 0.4;
    this.alpha  = this.baseA;
    this.color  = COLORS[Math.floor(Math.random() * COLORS.length)];
    this.phase  = Math.random() * Math.PI * 2;
    this.freq   = 0.0002 + Math.random() * 0.001;
    this.stiffness = 0.003 + Math.random() * 0.012; // 弹簧刚度
    this.damping   = 0.92 + Math.random() * 0.06;    // 阻尼系数
    if (doInit) this.spawn();
  }

  Particle.prototype.spawn = function() {
    this.homeX = Math.random() * W;
    this.homeY = Math.random() * H;
    this.x = this.homeX;
    this.y = this.homeY;
    this.vxRef.v = (Math.random() - 0.5) * 0.3;
    this.vyRef.v = (Math.random() - 0.5) * 0.3;
  };

  Particle.prototype.update = function(t) {
    // 有机漂移
    var driftX = Math.sin(t * this.freq + this.phase) * 0.5;
    var driftY = Math.cos(t * this.freq * 1.37 + this.phase) * 0.5;
    this.homeX += driftX * 0.015;
    this.homeY += driftY * 0.015;

    // 边界回流 —— home 也限制在屏幕内
    if (this.homeX < 0) this.homeX += W;
    if (this.homeX > W) this.homeX -= W;
    if (this.homeY < 0) this.homeY += H;
    if (this.homeY > H) this.homeY -= H;

    // ── 鼠标扰动 ──────────────────────────
    var dx = mouse.x - this.x;
    var dy = mouse.y - this.y;
    var d = Math.sqrt(dx * dx + dy * dy);

    if (d < MOUSE_RADIUS && d > 0.01) {
      var f  = 1 - d / MOUSE_RADIUS;
      var f2 = f * f * 0.07;
      // 直接施加力
      this.vxRef.v += (dx / d) * f2 + mouse.vx * f * 0.03;
      this.vyRef.v += (dy / d) * f2 + mouse.vy * f * 0.03;
      // 提升亮度
      this.alpha = Math.min(0.9, this.baseA + f * 0.6);
    } else {
      this.alpha += (this.baseA - this.alpha) * 0.03;
    }

    // ── 弹簧回归原位 ──────────────────────
    var sx = springClamp(this.x, this.homeX, this.vxRef, this.stiffness, this.damping);
    var sy = springClamp(this.y, this.homeY, this.vyRef, this.stiffness, this.damping);

    this.x = sx.value;
    this.y = sy.value;
    this.vxRef.v = sx.v;
    this.vyRef.v = sy.v;

    // 速度钳制
    var spd = Math.sqrt(this.vxRef.v * this.vxRef.v + this.vyRef.v * this.vyRef.v);
    var maxSpd = 3.5;
    if (spd > maxSpd) {
      this.vxRef.v = (this.vxRef.v / spd) * maxSpd;
      this.vyRef.v = (this.vyRef.v / spd) * maxSpd;
    }
  };

  Particle.prototype.draw = function(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + this.color + ',' + this.alpha + ')';
    ctx.fill();
  };

  // ── 涟漪类 ──────────────────────────────
  function Ripple(x, y, color) {
    this.x = x;
    this.y = y;
    this.radius = 2;
    this.maxRadius = 60 + Math.random() * 120;
    this.speed = 1.5 + Math.random() * 3;
    this.life = 1;
    this.decay = 0.012 + Math.random() * 0.025;
    this.color = color || '167,139,250';
  }

  Ripple.prototype.update = function() {
    this.radius += this.speed;
    this.life -= this.decay;
    return this.life > 0;
  };

  Ripple.prototype.draw = function(ctx) {
    var a = this.life * 0.35;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(' + this.color + ',' + a + ')';
    ctx.lineWidth = 2 * this.life;
    ctx.stroke();
  };

  // ── 初始化粒子 ──────────────────────────
  var particles = [];
  for (var i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle(true));
  }

  // 响应式调整粒子数
  window.addEventListener('resize', function() {
    var target = Math.min(150, Math.floor(W * H / 6000));
    while (particles.length < target) particles.push(new Particle(true));
    while (particles.length > target) particles.pop();
  });

  // ── 鼠标事件（中值滤波）─────────────────
  document.addEventListener('mousemove', function(e) {
    mouse.px = mouse.x; mouse.py = mouse.y;
    mouse.x = e.clientX; mouse.y = e.clientY;
    mouse.vx = mouse.x - mouse.px; mouse.vy = mouse.y - mouse.py;

    // 中值滤波平滑
    medianPush(mouseXBuf, mouse.x, MEDIAN_WINDOW);
    medianPush(mouseYBuf, mouse.y, MEDIAN_WINDOW);
    mouse.x = median(mouseXBuf);
    mouse.y = median(mouseYBuf);

    // 拖尾
    mouseTrail.push({ x: mouse.x, y: mouse.y, a: 1 });
    if (mouseTrail.length > TRAIL_MAX) mouseTrail.shift();
    for (var i = 0; i < mouseTrail.length; i++) {
      mouseTrail[i].a *= 0.84;
    }
  });

  // ── 点击涟漪 ────────────────────────────
  document.addEventListener('click', function(e) {
    var cx = e.clientX, cy = e.clientY;
    // 多圈涟漪
    for (var r = 0; r < 3; r++) {
      ripples.push(new Ripple(cx, cy, COLORS[Math.floor(Math.random() * COLORS.length)]));
    }
    // 粒子爆发
    var burstCount = 36;
    for (var i = 0; i < burstCount; i++) {
      var ang = (Math.PI * 2 / burstCount) * i + (Math.random() - 0.5) * 0.5;
      var spd = 2 + Math.random() * 7;
      var p = new Particle(false);
      p.x = cx; p.y = cy;
      p.homeX = cx; p.homeY = cy;
      p.vxRef.v = Math.cos(ang) * spd;
      p.vyRef.v = Math.sin(ang) * spd;
      p.size = 0.6 + Math.random() * 2.5;
      p.alpha = 0.9;
      p.baseA = 0.05;
      p.stiffness = 0.002;
      p.damping = 0.95;
      p.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      particles.push(p);
      // 限制总粒子数
      if (particles.length > 250) particles.shift();
    }
  });

  // ── 触控（centroid 多指质心）────────────
  document.addEventListener('touchmove', function(e) {
    touches = [];
    for (var i = 0; i < e.touches.length; i++) {
      touches.push({ x: e.touches[i].clientX, y: e.touches[i].clientY });
    }
    if (touches.length) {
      var c = centroid(touches);
      mouse.px = mouse.x; mouse.py = mouse.y;
      mouse.x = c.x; mouse.y = c.y;
      mouse.vx = mouse.x - mouse.px; mouse.vy = mouse.y - mouse.py;

      medianPush(mouseXBuf, mouse.x, MEDIAN_WINDOW);
      medianPush(mouseYBuf, mouse.y, MEDIAN_WINDOW);
      mouse.x = median(mouseXBuf);
      mouse.y = median(mouseYBuf);
    }
  }, { passive: true });

  document.addEventListener('touchend', function() {
    touches = [];
  });

  // ── 渲染循环 ────────────────────────────
  function render(t) {
    ctx.clearRect(0, 0, W, H);

    // ── 连线 ──────────────────────────────
    for (var i = 0; i < particles.length; i++) {
      for (var j = i + 1; j < particles.length; j++) {
        var d = dist2(particles[i], particles[j]);
        if (d < CONNECT_DIST) {
          var a = (1 - d / CONNECT_DIST) * 0.14;
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = 'rgba(167,139,250,' + a + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }

    // ── 粒子更新与绘制 ────────────────────
    for (var i = 0; i < particles.length; i++) {
      particles[i].update(t);
      particles[i].draw(ctx);
    }

    // ── 鼠标拖尾光晕 ──────────────────────
    if (mouseTrail.length > 1) {
      ctx.lineCap = 'round';
      for (var i = 1; i < mouseTrail.length; i++) {
        var p0 = mouseTrail[i - 1];
        var p1 = mouseTrail[i];
        var a = (i / mouseTrail.length) * 0.3 * (p1.a || 0.05);
        ctx.beginPath();
        ctx.moveTo(p0.x, p0.y);
        ctx.lineTo(p1.x, p1.y);
        ctx.strokeStyle = 'rgba(167,139,250,' + a + ')';
        ctx.lineWidth = i * 1.4;
        ctx.stroke();
      }
    }

    // ── 鼠标径向辉光 ──────────────────────
    var gr = MOUSE_RADIUS * 0.6;
    var grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, gr);
    grad.addColorStop(0, 'rgba(167,139,250,0.08)');
    grad.addColorStop(0.4, 'rgba(139,92,246,0.04)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(mouse.x - gr, mouse.y - gr, gr * 2, gr * 2);

    // ── 涟漪 ──────────────────────────────
    for (var i = ripples.length - 1; i >= 0; i--) {
      if (!ripples[i].update()) {
        ripples.splice(i, 1);
      } else {
        ripples[i].draw(ctx);
      }
    }

    // ── 触控点可视化 ──────────────────────
    if (touches.length) {
      var c = centroid(touches);
      var tg = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, 80);
      tg.addColorStop(0, 'rgba(196,181,253,0.25)');
      tg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tg;
      ctx.fillRect(c.x - 80, c.y - 80, 160, 160);

      for (var i = 0; i < touches.length; i++) {
        ctx.beginPath();
        ctx.arc(touches[i].x, touches[i].y, 12, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(196,181,253,0.35)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(167,139,250,0.6)';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
    }

    animId = requestAnimationFrame(render);
  }

  animId = requestAnimationFrame(render);
})();
</script>

<!-- ═══════════════════════════════════════════
     Galaxy · 星光粒子背景（严格按照组件实现）
     核心：ogl WebGL · 程序化星场 · 鼠标排斥
     ═══════════════════════════════════════════ -->
<script>
(function(){
  const container = document.getElementById('galaxy-bg');
  if (!container || !window.OGL) return;

  var OGL = window.OGL;

  // ═══════════ 顶点着色器（与组件完全一致）═══════════
  var vertexShader = "attribute vec2 uv;\nattribute vec2 position;\nvarying vec2 vUv;\nvoid main() {\n  vUv = uv;\n  gl_Position = vec4(position, 0, 1);\n}";

  // ═══════════ 片元着色器（与组件完全一致）═══════════
  var fragmentShader = "precision highp float;\n\nuniform float uTime;\nuniform vec3 uResolution;\nuniform vec2 uFocal;\nuniform vec2 uRotation;\nuniform float uStarSpeed;\nuniform float uDensity;\nuniform float uHueShift;\nuniform float uSpeed;\nuniform vec2 uMouse;\nuniform float uGlowIntensity;\nuniform float uSaturation;\nuniform bool uMouseRepulsion;\nuniform float uTwinkleIntensity;\nuniform float uRotationSpeed;\nuniform float uRepulsionStrength;\nuniform float uMouseActiveFactor;\nuniform float uAutoCenterRepulsion;\nuniform bool uTransparent;\n\nvarying vec2 vUv;\n\n#define NUM_LAYER 4.0\n#define STAR_COLOR_CUTOFF 0.2\n#define MAT45 mat2(0.7071, -0.7071, 0.7071, 0.7071)\n#define PERIOD 3.0\n\nfloat Hash21(vec2 p) {\n  p = fract(p * vec2(123.34, 456.21));\n  p += dot(p, p + 45.32);\n  return fract(p.x * p.y);\n}\n\nfloat tri(float x) {\n  return abs(fract(x) * 2.0 - 1.0);\n}\n\nfloat tris(float x) {\n  float t = fract(x);\n  return 1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0));\n}\n\nfloat trisn(float x) {\n  float t = fract(x);\n  return 2.0 * (1.0 - smoothstep(0.0, 1.0, abs(2.0 * t - 1.0))) - 1.0;\n}\n\nvec3 hsv2rgb(vec3 c) {\n  vec4 K = vec4(1.0, 2.0 / 3.0, 1.0 / 3.0, 3.0);\n  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);\n  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);\n}\n\nfloat Star(vec2 uv, float flare) {\n  float d = length(uv);\n  float m = (0.05 * uGlowIntensity) / d;\n  float rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));\n  m += rays * flare * uGlowIntensity;\n  uv *= MAT45;\n  rays = smoothstep(0.0, 1.0, 1.0 - abs(uv.x * uv.y * 1000.0));\n  m += rays * 0.3 * flare * uGlowIntensity;\n  m *= smoothstep(1.0, 0.2, d);\n  return m;\n}\n\nvec3 StarLayer(vec2 uv) {\n  vec3 col = vec3(0.0);\n  vec2 gv = fract(uv) - 0.5;\n  vec2 id = floor(uv);\n\n  for (int y = -1; y <= 1; y++) {\n    for (int x = -1; x <= 1; x++) {\n      vec2 offset = vec2(float(x), float(y));\n      vec2 si = id + vec2(float(x), float(y));\n      float seed = Hash21(si);\n      float size = fract(seed * 345.32);\n      float glossLocal = tri(uStarSpeed / (PERIOD * seed + 1.0));\n      float flareSize = smoothstep(0.9, 1.0, size) * glossLocal;\n\n      float red = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 1.0)) + STAR_COLOR_CUTOFF;\n      float blu = smoothstep(STAR_COLOR_CUTOFF, 1.0, Hash21(si + 3.0)) + STAR_COLOR_CUTOFF;\n      float grn = min(red, blu) * seed;\n      vec3 base = vec3(red, grn, blu);\n\n      float hue = atan(base.g - base.r, base.b - base.r) / (2.0 * 3.14159) + 0.5;\n      hue = fract(hue + uHueShift / 360.0);\n      float sat = length(base - vec3(dot(base, vec3(0.299, 0.587, 0.114)))) * uSaturation;\n      float val = max(max(base.r, base.g), base.b);\n      base = hsv2rgb(vec3(hue, sat, val));\n\n      vec2 pad = vec2(tris(seed * 34.0 + uTime * uSpeed / 10.0), tris(seed * 38.0 + uTime * uSpeed / 30.0)) - 0.5;\n\n      float star = Star(gv - offset - pad, flareSize);\n      vec3 color = base;\n\n      float twinkle = trisn(uTime * uSpeed + seed * 6.2831) * 0.5 + 1.0;\n      twinkle = mix(1.0, twinkle, uTwinkleIntensity);\n      star *= twinkle;\n\n      col += star * size * color;\n    }\n  }\n\n  return col;\n}\n\nvoid main() {\n  vec2 focalPx = uFocal * uResolution.xy;\n  vec2 uv = (vUv * uResolution.xy - focalPx) / uResolution.y;\n\n  vec2 mouseNorm = uMouse - vec2(0.5);\n\n  if (uAutoCenterRepulsion > 0.0) {\n    vec2 centerUV = vec2(0.0, 0.0);\n    float centerDist = length(uv - centerUV);\n    vec2 repulsion = normalize(uv - centerUV) * (uAutoCenterRepulsion / (centerDist + 0.1));\n    uv += repulsion * 0.05;\n  } else if (uMouseRepulsion) {\n    vec2 mousePosUV = (uMouse * uResolution.xy - focalPx) / uResolution.y;\n    float mouseDist = length(uv - mousePosUV);\n    vec2 repulsion = normalize(uv - mousePosUV) * (uRepulsionStrength / (mouseDist + 0.1));\n    uv += repulsion * 0.05 * uMouseActiveFactor;\n  } else {\n    vec2 mouseOffset = mouseNorm * 0.1 * uMouseActiveFactor;\n    uv += mouseOffset;\n  }\n\n  float autoRotAngle = uTime * uRotationSpeed;\n  mat2 autoRot = mat2(cos(autoRotAngle), -sin(autoRotAngle), sin(autoRotAngle), cos(autoRotAngle));\n  uv = autoRot * uv;\n\n  uv = mat2(uRotation.x, -uRotation.y, uRotation.y, uRotation.x) * uv;\n\n  vec3 col = vec3(0.0);\n\n  for (float i = 0.0; i < 1.0; i += 1.0 / NUM_LAYER) {\n    float depth = fract(i + uStarSpeed * uSpeed);\n    float scale = mix(20.0 * uDensity, 0.5 * uDensity, depth);\n    float fade = depth * smoothstep(1.0, 0.9, depth);\n    col += StarLayer(uv * scale + i * 453.32) * fade;\n  }\n\n  if (uTransparent) {\n    float alpha = length(col);\n    alpha = smoothstep(0.0, 0.3, alpha);\n    alpha = min(alpha, 1.0);\n    gl_FragColor = vec4(col, alpha);\n  } else {\n    gl_FragColor = vec4(col, 1.0);\n  }\n}";

  // ═══════════ 参数（与组件默认值一致）═══════════
  var focal = [0.5, 0.5];
  var rotation = [1.0, 0.0];
  var starSpeed = 0.5;
  var density = 1.0;
  var hueShift = 200;
  var speed = 0.6;
  var glowIntensity = 0.45;
  var saturation = 0.15;
  var mouseRepulsion = true;
  var repulsionStrength = 2.5;
  var twinkleIntensity = 0.4;
  var rotationSpeed = 0.08;
  var autoCenterRepulsion = 0.0;
  var transparent = true;

  var targetMousePos = { x: 0.5, y: 0.5 };
  var smoothMousePos = { x: 0.5, y: 0.5 };
  var targetMouseActive = 0.0;
  var smoothMouseActive = 0.0;

  // ── Renderer ──
  var renderer = new OGL.Renderer({ alpha: transparent, premultipliedAlpha: false });
  var gl = renderer.gl;

  if (transparent) {
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
    gl.clearColor(0, 0, 0, 0);
  }

  var program;

  function resize() {
    var scale = 1;
    renderer.setSize(container.offsetWidth * scale, container.offsetHeight * scale);
    if (program) {
      program.uniforms.uResolution.value = new OGL.Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height);
    }
  }
  window.addEventListener('resize', resize, false);
  resize();

  // ── Program ──
  var geometry = new OGL.Triangle(gl);
  program = new OGL.Program(gl, {
    vertex: vertexShader,
    fragment: fragmentShader,
    uniforms: {
      uTime: { value: 0 },
      uResolution: { value: new OGL.Color(gl.canvas.width, gl.canvas.height, gl.canvas.width / gl.canvas.height) },
      uFocal: { value: new Float32Array(focal) },
      uRotation: { value: new Float32Array(rotation) },
      uStarSpeed: { value: starSpeed },
      uDensity: { value: density },
      uHueShift: { value: hueShift },
      uSpeed: { value: speed },
      uMouse: { value: new Float32Array([smoothMousePos.x, smoothMousePos.y]) },
      uGlowIntensity: { value: glowIntensity },
      uSaturation: { value: saturation },
      uMouseRepulsion: { value: mouseRepulsion },
      uTwinkleIntensity: { value: twinkleIntensity },
      uRotationSpeed: { value: rotationSpeed },
      uRepulsionStrength: { value: repulsionStrength },
      uMouseActiveFactor: { value: 0.0 },
      uAutoCenterRepulsion: { value: autoCenterRepulsion },
      uTransparent: { value: transparent }
    }
  });

  var mesh = new OGL.Mesh(gl, { geometry: geometry, program: program });
  var animateId;

  // ── 渲染循环（与组件完全一致）──
  function update(t) {
    animateId = requestAnimationFrame(update);
    program.uniforms.uTime.value = t * 0.001;
    program.uniforms.uStarSpeed.value = (t * 0.001 * starSpeed) / 10.0;

    var lerpFactor = 0.05;
    smoothMousePos.x += (targetMousePos.x - smoothMousePos.x) * lerpFactor;
    smoothMousePos.y += (targetMousePos.y - smoothMousePos.y) * lerpFactor;
    smoothMouseActive += (targetMouseActive - smoothMouseActive) * lerpFactor;

    program.uniforms.uMouse.value[0] = smoothMousePos.x;
    program.uniforms.uMouse.value[1] = smoothMousePos.y;
    program.uniforms.uMouseActiveFactor.value = smoothMouseActive;

    renderer.render({ scene: mesh });
  }
  animateId = requestAnimationFrame(update);
  container.appendChild(gl.canvas);

  // ═══════════ 鼠标交互（与组件完全一致）═══════════
  function handleMouseMove(e) {
    var rect = container.getBoundingClientRect();
    targetMousePos.x = (e.clientX - rect.left) / rect.width;
    targetMousePos.y = 1.0 - (e.clientY - rect.top) / rect.height;
    targetMouseActive = 1.0;
  }

  function handleMouseLeave() {
    targetMouseActive = 0.0;
  }

  container.addEventListener('mousemove', handleMouseMove);
  container.addEventListener('mouseleave', handleMouseLeave);

  container.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      var rect = container.getBoundingClientRect();
      targetMousePos.x = (e.touches[0].clientX - rect.left) / rect.width;
      targetMousePos.y = 1.0 - (e.touches[0].clientY - rect.top) / rect.height;
      targetMouseActive = 1.0;
    }
  }, { passive: true });

  container.addEventListener('touchend', function() {
    targetMouseActive = 0.0;
  });
})();
</script>

<script>
(function(){
  // ── 励志语录 ──
  const quotes = [

    { zh: '当你决定出发，最困难的部分已经完成', en: 'The hardest part is deciding to begin' },

  ];

  let currentQuote = 0;
  let quoteTimer = null;

  function waitForAbout(cb) {
    var el = document.getElementById('about');
    if (el) { cb(el); return; }
    var count = 0;
    var check = setInterval(function() {
      el = document.getElementById('about');
      if (el) { clearInterval(check); cb(el); return; }
      if (++count > 60) { clearInterval(check); } // 30s timeout
    }, 500);
  }

  function createVitalitySection() {
    // 创建主容器
    var section = document.createElement('section');
    section.id = 'vitality';

    // 背景图
    var bg = document.createElement('div');
    bg.className = 'vita-bg';
    section.appendChild(bg);

    // 渐变遮罩
    var overlay = document.createElement('div');
    overlay.className = 'vita-overlay';
    section.appendChild(overlay);

    // 光粒子
    var sparkContainer = document.createElement('div');
    sparkContainer.className = 'vita-particles';
    for (var i = 0; i < 18; i++) {
      var spark = document.createElement('div');
      spark.className = 'vita-spark';
      spark.style.left = (Math.random() * 90 + 5) + '%';
      spark.style.bottom = '-10px';
      spark.style.setProperty('--dur', (Math.random() * 10 + 12) + 's');
      spark.style.setProperty('--delay', (Math.random() * 15) + 's');
      sparkContainer.appendChild(spark);
    }
    section.appendChild(sparkContainer);

    // 内容层
    var content = document.createElement('div');
    content.className = 'vita-content';

    // 图标（发芽/生命）
    var icon = document.createElement('div');
    icon.className = 'vita-icon';
    icon.innerHTML = '<svg viewBox="0 0 56 56" fill="none"><path d="M28 52C28 52 14 38 14 26C14 18.2 20.2 12 28 12C35.8 12 42 18.2 42 26C42 38 28 52 28 52Z" fill="none" stroke="rgba(167,139,250,0.7)" stroke-width="1.5"/><path d="M28 42C28 42 20 34 20 26C20 21.6 23.6 18 28 18C32.4 18 36 21.6 36 26C36 34 28 42 28 42Z" fill="rgba(196,181,253,0.2)" stroke="rgba(196,181,253,0.5)" stroke-width="1"/><circle cx="28" cy="22" r="3" fill="rgba(167,139,250,0.8)"/><line x1="28" y1="42" x2="28" y2="52" stroke="rgba(167,139,250,0.35)" stroke-width="1"/></svg>';
    content.appendChild(icon);

    // 语录舞台
    var stage = document.createElement('div');
    stage.className = 'vita-quote-stage';

    quotes.forEach(function(q, i) {
      var quoteEl = document.createElement('div');
      quoteEl.className = 'vita-quote' + (i === 0 ? ' active' : '');
      quoteEl.setAttribute('data-index', i);
      quoteEl.innerHTML = q.zh + '<span class="en">' + q.en + '</span>';
      stage.appendChild(quoteEl);
    });
    content.appendChild(stage);

    // 指示点
    var dots = document.createElement('div');
    dots.className = 'vita-dots';
    quotes.forEach(function(_, i) {
      var dot = document.createElement('div');
      dot.className = 'vita-dot' + (i === 0 ? ' active' : '');
      dot.setAttribute('data-index', i);
      dot.addEventListener('click', function() {
        switchQuote(parseInt(this.getAttribute('data-index')));
      });
      dots.appendChild(dot);
    });
    content.appendChild(dots);

    section.appendChild(content);

    // 滚动提示
    var scrollHint = document.createElement('div');
    scrollHint.className = 'vita-scroll-hint';
    scrollHint.innerHTML = '<span>SCROLL</span><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>';
    section.appendChild(scrollHint);

    return section;
  }

  function switchQuote(index) {
    if (index === currentQuote) return;
    var allQuotes = document.querySelectorAll('#vitality .vita-quote');
    var allDots = document.querySelectorAll('#vitality .vita-dot');

    // 移除旧
    if (allQuotes[currentQuote]) allQuotes[currentQuote].classList.remove('active');
    if (allDots[currentQuote]) allDots[currentQuote].classList.remove('active');

    currentQuote = index;

    // 添加新
    if (allQuotes[currentQuote]) allQuotes[currentQuote].classList.add('active');
    if (allDots[currentQuote]) allDots[currentQuote].classList.add('active');
  }

  function startQuoteRotation() {
    quoteTimer = setInterval(function() {
      var next = (currentQuote + 1) % quotes.length;
      switchQuote(next);
    }, 5000);
  }

  // ── 创建展示行（头像卡 + 3D 车子）──
  function createShowcaseRow() {
    var row = document.createElement('div');
    row.id = 'showcase-row';

    // ═══════ 头像色块卡 ═══════
    var cardWrap = document.createElement('div');
    cardWrap.className = 'pc-card-wrapper';
    cardWrap.innerHTML =
      '<div class="pc-behind"></div>' +
      '<div class="pc-card-shell">' +
        '<section class="pc-card">' +
          '<div class="pc-inside">' +
            '<div class="pc-shine"></div>' +
            '<div class="pc-glare"></div>' +
            '<div class="pc-content pc-avatar-content">' +
              '<img class="avatar" src="微信图片_20251113205104_308_180.jpg" alt="蒙恒昌 avatar" loading="lazy" />' +
              '<div class="pc-user-info">' +
                '<div class="pc-mini-avatar"><img src="微信图片_20251113205104_308_180.jpg" alt="mini avatar" /></div>' +
                '<div class="pc-user-text"><div class="pc-handle">@MHChenry</div><div class="pc-status">探索中</div></div>' +
                '<button class="pc-contact-btn" onclick="document.getElementById(\'contact\').scrollIntoView({behavior:\'smooth\'})">联系我</button>' +
              '</div>' +
            '</div>' +
            '<div class="pc-content"><div class="pc-details"><h3>蒙恒昌</h3><p>全栈开发者 · AI 探索者 · 终身学习者</p></div></div>' +
          '</div>' +
        '</section>' +
      '</div>';

    // 头像卡 3D 倾斜
    initProfileCardTilt(cardWrap);

    // ═══════ 3D 车子展示 ═══════
    var carWrap = document.createElement('div');
    carWrap.id = 'car-viewer-wrap';

    row.appendChild(cardWrap);
    row.appendChild(carWrap);
    return row;
  }

  // ═══════ 头像卡 3D 倾斜引擎（严格按照组件实现）═══════
  function initProfileCardTilt(wrap) {
    var shell = wrap.querySelector('.pc-card-shell');
    if (!shell) return;

    var currentX = 0, currentY = 0;
    var targetX = 0, targetY = 0;
    var rafId = null, running = false, lastTs = 0;
    var DEFAULT_TAU = 0.14, INITIAL_TAU = 0.6;
    var initialUntil = 0;

    function clamp(v, min, max) { return Math.min(Math.max(v, min||0), max||100); }
    function round(v, p) { p = p || 3; return parseFloat(v.toFixed(p)); }
    function adjust(v, fMin, fMax, tMin, tMax) { return round(tMin + ((tMax - tMin) * (v - fMin)) / (fMax - fMin)); }

    function setVarsFromXY(x, y) {
      var w = shell.clientWidth || 1;
      var h = shell.clientHeight || 1;
      var pctX = clamp((100 / w) * x);
      var pctY = clamp((100 / h) * y);
      var cx = pctX - 50, cy = pctY - 50;
      wrap.style.setProperty('--pointer-x', pctX + '%');
      wrap.style.setProperty('--pointer-y', pctY + '%');
      wrap.style.setProperty('--background-x', adjust(pctX, 0, 100, 35, 65) + '%');
      wrap.style.setProperty('--background-y', adjust(pctY, 0, 100, 35, 65) + '%');
      wrap.style.setProperty('--pointer-from-center', clamp(Math.hypot(pctY-50, pctX-50)/50, 0, 1));
      wrap.style.setProperty('--pointer-from-top', pctY/100);
      wrap.style.setProperty('--pointer-from-left', pctX/100);
      wrap.style.setProperty('--rotate-x', round(-(cx/5)) + 'deg');
      wrap.style.setProperty('--rotate-y', round(cy/4) + 'deg');
    }

    function step(ts) {
      if (!running) return;
      if (lastTs === 0) lastTs = ts;
      var dt = (ts - lastTs) / 1000;
      lastTs = ts;
      var tau = ts < initialUntil ? INITIAL_TAU : DEFAULT_TAU;
      var k = 1 - Math.exp(-dt / tau);
      currentX += (targetX - currentX) * k;
      currentY += (targetY - currentY) * k;
      setVarsFromXY(currentX, currentY);
      var far = Math.abs(targetX - currentX) > 0.05 || Math.abs(targetY - currentY) > 0.05;
      if (far || document.hasFocus()) rafId = requestAnimationFrame(step);
      else { running = false; lastTs = 0; if (rafId) { cancelAnimationFrame(rafId); rafId = null; } }
    }

    function start() {
      if (running) return;
      running = true; lastTs = 0;
      rafId = requestAnimationFrame(step);
    }

    function setTarget(x, y) { targetX = x; targetY = y; start(); }

    function getOffsets(evt) {
      var rect = shell.getBoundingClientRect();
      return { x: evt.clientX - rect.left, y: evt.clientY - rect.top };
    }

    shell.addEventListener('pointerenter', function(e) {
      shell.classList.add('active'); shell.classList.add('entering');
      setTimeout(function(){ shell.classList.remove('entering'); }, 180);
      var o = getOffsets(e);
      setTarget(o.x, o.y);
    });

    shell.addEventListener('pointermove', function(e) {
      var o = getOffsets(e);
      setTarget(o.x, o.y);
    });

    shell.addEventListener('pointerleave', function() {
      var cw = shell.clientWidth / 2, ch = shell.clientHeight / 2;
      setTarget(cw, ch);
      var check = function() {
        var far = Math.abs(targetX - currentX) > 0.6 || Math.abs(targetY - currentY) > 0.6;
        if (!far) { shell.classList.remove('active'); }
        else { requestAnimationFrame(check); }
      };
      requestAnimationFrame(check);
    });

    // 初始动画
    var initX = (shell.clientWidth || 0) - 70;
    var initY = 60;
    currentX = initX; currentY = initY;
    setVarsFromXY(initX, initY);
    var cw = shell.clientWidth / 2, ch = shell.clientHeight / 2;
    setTarget(cw, ch);
    initialUntil = performance.now() + 1200;
    start();
  }

  // ═══════ 3D 车子展示（Three.js 程序化低多边形车）═══════
  function initCarViewer(wrap) {
    if (!window.THREE) return;
    var THREE = window.THREE;

    var W = wrap.clientWidth, H = wrap.clientHeight;
    var scene = new THREE.Scene();
    var camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
    camera.position.set(0, 1.2, 5.5);
    camera.lookAt(0, 0.2, 0);

    var renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(W, H);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.shadowMap.enabled = true;
    wrap.appendChild(renderer.domElement);

    // ── 光照 ──
    scene.add(new THREE.AmbientLight(0x404060, 0.8));
    var key = new THREE.DirectionalLight(0xffffff, 2.5);
    key.position.set(5, 5, 5); key.castShadow = true;
    scene.add(key);
    var fill = new THREE.DirectionalLight(0xa78bfa, 1.0);
    fill.position.set(-5, 2, 5);
    scene.add(fill);
    var rim = new THREE.DirectionalLight(0xc4b5fd, 1.5);
    rim.position.set(0, 4, -5);
    scene.add(rim);

    // ── 地面 ──
    var floorGeo = new THREE.PlaneGeometry(12, 12);
    var floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1025, roughness: 0.8, metalness: 0.2 });
    var floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI/2; floor.position.y = -1.2; floor.receiveShadow = true;
    scene.add(floor);

    // ── 程序化低多边形车 ──
    var carGroup = new THREE.Group();

    // 车身
    var bodyGeo = new THREE.BoxGeometry(1.8, 0.55, 3.8);
    var bodyMat = new THREE.MeshStandardMaterial({ color: 0x8b5cf6, roughness: 0.25, metalness: 0.6 });
    var body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.35; body.castShadow = true; body.receiveShadow = true;
    carGroup.add(body);

    // 车顶
    var roofGeo = new THREE.BoxGeometry(1.5, 0.4, 1.8);
    var roofMat = new THREE.MeshStandardMaterial({ color: 0x7c3aed, roughness: 0.2, metalness: 0.7 });
    var roof = new THREE.Mesh(roofGeo, roofMat);
    roof.position.set(0, 0.8, -0.15); roof.castShadow = true;
    carGroup.add(roof);

    // 前挡风
    var windshieldGeo = new THREE.BoxGeometry(1.3, 0.35, 0.08);
    var windshieldMat = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.1, metalness: 0.9 });
    var windshield = new THREE.Mesh(windshieldGeo, windshieldMat);
    windshield.position.set(0, 0.62, 0.78);
    windshield.rotation.x = -0.45;
    carGroup.add(windshield);

    // 后挡风
    var backGlass = new THREE.Mesh(windshieldGeo.clone(), windshieldMat);
    backGlass.position.set(0, 0.62, -1.05);
    backGlass.rotation.x = 0.45;
    carGroup.add(backGlass);

    // 轮子
    function createWheel(x, z) {
      var wg = new THREE.Group();
      var tireGeo = new THREE.CylinderGeometry(0.32, 0.32, 0.3, 24);
      var tireMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9, metalness: 0.1 });
      var tire = new THREE.Mesh(tireGeo, tireMat);
      tire.rotation.z = Math.PI/2; tire.castShadow = true;
      wg.add(tire);
      var rimGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.31, 8);
      var rimMat = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.2, metalness: 0.9 });
      var rim = new THREE.Mesh(rimGeo, rimMat);
      rim.rotation.z = Math.PI/2;
      wg.add(rim);
      wg.position.set(x, 0, z);
      return wg;
    }
    carGroup.add(createWheel(1.05, 1.1));
    carGroup.add(createWheel(-1.05, 1.1));
    carGroup.add(createWheel(1.05, -1.1));
    carGroup.add(createWheel(-1.05, -1.1));

    // 前灯
    var lightGeo = new THREE.SphereGeometry(0.12, 8, 8);
    var lightMat = new THREE.MeshStandardMaterial({ color: 0xffffcc, roughness: 0.1, emissive: 0xffffcc, emissiveIntensity: 0.5 });
    var headlightL = new THREE.Mesh(lightGeo, lightMat);
    headlightL.position.set(0.55, 0.35, 1.9);
    carGroup.add(headlightL);
    var headlightR = new THREE.Mesh(lightGeo, lightMat);
    headlightR.position.set(-0.55, 0.35, 1.9);
    carGroup.add(headlightR);

    carGroup.position.y = 0.15;
    scene.add(carGroup);

    // ── 粒子尾气 ──
    var particlesGeo = new THREE.BufferGeometry();
    var particleCount = 40;
    var positions = new Float32Array(particleCount * 3);
    for (var i = 0; i < particleCount; i++) {
      positions[i*3] = (Math.random()-0.5)*0.6;
      positions[i*3+1] = 0.2 + Math.random()*0.2;
      positions[i*3+2] = -1.9 - Math.random()*0.6;
    }
    particlesGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    var particlesMat = new THREE.PointsMaterial({ color: 0xc4b5fd, size: 0.04, transparent: true, opacity: 0.5 });
    var particles = new THREE.Points(particlesGeo, particlesMat);
    carGroup.add(particles);

    // ── 交互状态 ──
    var isDragging = false, prevX = 0, prevY = 0;
    var rotY = 0.35, rotX = -0.15;
    var autoRotate = true;
    var velX = 0, velY = 0;

    wrap.addEventListener('pointerdown', function(e) {
      isDragging = true; autoRotate = false;
      prevX = e.clientX; prevY = e.clientY;
      wrap.style.cursor = 'grabbing';
    });
    window.addEventListener('pointermove', function(e) {
      if (!isDragging) return;
      var dx = e.clientX - prevX, dy = e.clientY - prevY;
      prevX = e.clientX; prevY = e.clientY;
      velY = dx * 0.005; velX = dy * 0.005;
      rotY += velY; rotX += velX;
    });
    window.addEventListener('pointerup', function() {
      isDragging = false; wrap.style.cursor = 'grab';
      setTimeout(function(){ autoRotate = true; }, 1500);
    });

    function resize3D() {
      var ww = wrap.clientWidth, wh = wrap.clientHeight;
      renderer.setSize(ww, wh);
      camera.aspect = ww/wh;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize3D);

    // ── 渲染循环 ──
    function tick3D(t) {
      requestAnimationFrame(tick3D);
      var dt = Math.min(0.05, t * 0.001 - (tick3D._last || 0));
      tick3D._last = t * 0.001;
      if (autoRotate) { rotY += 0.003; velX *= 0.925; velY *= 0.925; }
      else { velX *= 0.925; velY *= 0.925; rotY += velY; rotX += velX; }
      carGroup.rotation.y = rotY;
      carGroup.rotation.x = rotX;

      // 粒子动画
      var pos = particles.geometry.attributes.position.array;
      for (var i = 0; i < particleCount; i++) {
        pos[i*3+2] -= 0.008;
        if (pos[i*3+2] < -2.8) { pos[i*3+2] = -1.9; pos[i*3] = (Math.random()-0.5)*0.6; pos[i*3+1] = 0.2+Math.random()*0.2; }
      }
      particles.geometry.attributes.position.needsUpdate = true;

      renderer.render(scene, camera);
    }
    tick3D._last = 0;
    requestAnimationFrame(tick3D);
  }

  // ── 插入 DOM ──
  waitForAbout(function(aboutEl) {
    var vitality = createVitalitySection();

    // 在 vitality 内容区下方插入展示行
    var content = vitality.querySelector('.vita-content');
    var row = createShowcaseRow();
    content.parentNode.insertBefore(row, content.nextSibling);

    aboutEl.parentNode.insertBefore(vitality, aboutEl);
    startQuoteRotation();

    // 初始化 3D 车子
    var carWrap = document.getElementById('car-viewer-wrap');
    if (carWrap) initCarViewer(carWrap);
  });
})();
</script>
