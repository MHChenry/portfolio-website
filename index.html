<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蒙恒昌 — 数字化探索者</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.157.0/build/three.module.js"
  }
}
</script>
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: #020617;
    color: #e2e8f0;
    -webkit-font-smoothing: antialiased;
  }

  /* ═══════════ 背景层 ═══════════ */
  #gridscan-bg {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none;
  }
  #particle-bg {
    position: fixed; inset: 0; z-index: 1;
    pointer-events: none;
  }

  /* ═══════════ 内容层 ═══════════ */
  #overlay {
    position: fixed; inset: 0; z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  /* ═══════════ 几何旋转器 ═══════════ */
  .spinner-wrap {
    position: relative;
    width: 120px; height: 120px;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.15s forwards;
  }
  .spinner-ring {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 2px solid transparent;
  }
  .spinner-ring:nth-child(1) {
    border-top-color: rgba(167,139,250,0.8);
    animation: spin3d 2s linear infinite;
  }
  .spinner-ring:nth-child(2) {
    inset: 10px;
    border-right-color: rgba(196,181,253,0.6);
    animation: spin3d 2.5s linear infinite reverse;
  }
  .spinner-ring:nth-child(3) {
    inset: 20px;
    border-bottom-color: rgba(139,92,246,0.5);
    animation: spin3d 3s linear infinite;
  }
  .spinner-ring:nth-child(4) {
    inset: 30px;
    border-left-color: rgba(221,214,254,0.4);
    animation: spin3d 2.2s linear infinite reverse;
  }
  .spinner-triangle {
    position: absolute;
    inset: 25px;
    display: flex; align-items: center; justify-content: center;
    animation: pulseTriangle 2s ease-in-out infinite;
  }
  .spinner-triangle svg {
    width: 100%; height: 100%;
    filter: drop-shadow(0 0 20px rgba(167,139,250,0.5));
  }

  /* ═══════════ 标题 ═══════════ */
  .hero-name {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 900;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 16px;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.35s forwards;
  }
  .hero-name .gradient {
    background: linear-gradient(135deg, #c4b5fd 0%, #a78bfa 30%, #818cf8 60%, #e0e7ff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    background-size: 200% 200%;
    animation: gradientShift 4s ease-in-out infinite;
  }
  .hero-sub {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: clamp(0.75rem, 1.5vw, 0.95rem);
    font-weight: 400;
    letter-spacing: 0.35em;
    color: rgba(196,181,253,0.7);
    margin-bottom: 56px;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.5s forwards;
  }

  /* ═══════════ 进入按钮 ═══════════ */
  .enter-btn {
    pointer-events: auto;
    position: relative;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 16px 48px;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.15em;
    color: #fff;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(167,139,250,0.3);
    border-radius: 60px;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.7s forwards;
    overflow: hidden;
  }
  .enter-btn::before {
    content: '';
    position: absolute; inset: 0;
    border-radius: 60px;
    background: linear-gradient(135deg, rgba(167,139,250,0.2), rgba(99,102,241,0.2), rgba(167,139,250,0.2));
    background-size: 200% 200%;
    animation: gradientShift 3s ease-in-out infinite;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .enter-btn:hover::before { opacity: 1; }
  .enter-btn:hover {
    border-color: rgba(167,139,250,0.7);
    box-shadow: 0 0 60px rgba(167,139,250,0.25), 0 0 120px rgba(139,92,246,0.12);
    transform: scale(1.04);
  }
  .enter-btn:active { transform: scale(0.97); }
  .enter-btn .arrow {
    display: inline-block;
    transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    font-size: 1.2em;
  }
  .enter-btn:hover .arrow { transform: translateX(4px); }

  /* ═══════════ 进度条 ═══════════ */
  .progress-wrap {
    width: 200px; height: 2px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-top: 40px;
    overflow: hidden;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.6s forwards;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #818cf8, #c4b5fd);
    border-radius: 2px;
    width: 0%;
    transition: width 0.1s linear;
  }

  /* ═══════════ 角落标识 ═══════════ */
  .corner-tag {
    position: fixed; bottom: 32px; right: 40px; z-index: 10;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(167,139,250,0.35);
    letter-spacing: 0.3em;
    pointer-events: none;
    opacity: 0;
    animation: fadeInUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) 0.9s forwards;
  }

  /* ═══════════ 转场遮罩 ═══════════ */
  #transition-mask {
    position: fixed; inset: 0; z-index: 100;
    background: #020617;
    pointer-events: all;
    opacity: 0;
    transition: opacity 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  }
  #transition-mask.active {
    opacity: 1;
  }

  /* ═══════════ 动画关键帧 ═══════════ */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(30px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin3d {
    from { transform: rotateZ(0deg) rotateX(0deg); }
    to   { transform: rotateZ(360deg) rotateX(360deg); }
  }
  @keyframes pulseTriangle {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50%      { transform: scale(1.08); opacity: 1; }
  }
  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50%      { background-position: 100% 50%; }
  }

  /* ═══════════ 响应式 ═══════════ */
  @media (max-width: 640px) {
    .spinner-wrap { width: 80px; height: 80px; margin-bottom: 32px; }
    .enter-btn { padding: 14px 36px; font-size: 0.9rem; }
    .corner-tag { bottom: 20px; right: 20px; font-size: 10px; }
  }
</style>
</head>
<body>

  <!-- 3D 网格背景 -->
  <div id="gridscan-bg"></div>

  <!-- 粒子背景 -->
  <canvas id="particle-bg"></canvas>

  <!-- 内容层 -->
  <div id="overlay">
    <!-- 几何旋转器 -->
    <div class="spinner-wrap">
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-ring"></div>
      <div class="spinner-triangle">
        <svg viewBox="0 0 100 100" fill="none">
          <polygon points="50,10 90,80 10,80"
            fill="none" stroke="rgba(167,139,250,0.8)" stroke-width="1.5"
            stroke-linejoin="round" />
          <polygon points="50,25 75,72 25,72"
            fill="none" stroke="rgba(196,181,253,0.4)" stroke-width="1"
            stroke-linejoin="round" />
          <circle cx="50" cy="55" r="3" fill="rgba(167,139,250,0.9)" />
        </svg>
      </div>
    </div>

    <!-- 名字 -->
    <h1 class="hero-name"><span class="gradient">蒙恒昌</span></h1>

    <!-- 副标题 -->
    <p class="hero-sub">DIGITAL EXPLORER · 数字化探索者</p>

    <!-- 进入按钮 -->
    <a href="mhc-resume.html" class="enter-btn" id="enterBtn">
      <span>ENTER 进入</span>
      <span class="arrow">→</span>
    </a>

    <!-- 进度条 -->
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
  </div>

  <!-- 角落标识 -->
  <div class="corner-tag">&lt;MHC /&gt;</div>

  <!-- 转场遮罩 -->
  <div id="transition-mask"></div>

  <!-- ═══════════════════════════════════════════
       GridScan 3D 交互背景
       ═══════════════════════════════════════════ -->
  <script type="module">
    import * as THREE from 'three';

    const vert = /* glsl */`
    varying vec2 vUv;
    void main(){
      vUv = uv;
      gl_Position = vec4(position.xy, 0.0, 1.0);
    }
    `;

    const frag = /* glsl */`
    precision highp float;
    uniform vec3 iResolution;
    uniform float iTime;
    uniform vec2 uSkew;
    uniform float uTilt;
    uniform float uYaw;
    uniform float uLineThickness;
    uniform vec3 uLinesColor;
    uniform vec3 uScanColor;
    uniform float uGridScale;
    uniform float uLineStyle;
    uniform float uLineJitter;
    uniform float uScanOpacity;
    uniform float uScanDirection;
    uniform float uNoise;
    uniform float uBloomOpacity;
    uniform float uScanGlow;
    uniform float uScanSoftness;
    uniform float uPhaseTaper;
    uniform float uScanDuration;
    uniform float uScanDelay;
    varying vec2 vUv;

    uniform float uScanStarts[8];
    uniform float uScanCount;
    const int MAX_SCANS = 8;

    float smoother01(float a, float b, float x){
      float t = clamp((x - a) / max(1e-5, (b - a)), 0.0, 1.0);
      return t * t * t * (t * (t * 6.0 - 15.0) + 10.0);
    }

    void mainImage(out vec4 fragColor, in vec2 fragCoord)
    {
        vec2 p = (2.0 * fragCoord - iResolution.xy) / iResolution.y;
        vec3 ro = vec3(0.0);
        vec3 rd = normalize(vec3(p, 2.0));

        float cR = cos(uTilt), sR = sin(uTilt);
        rd.xy = mat2(cR, -sR, sR, cR) * rd.xy;
        float cY = cos(uYaw), sY = sin(uYaw);
        rd.xz = mat2(cY, -sY, sY, cY) * rd.xz;

        vec2 skew = clamp(uSkew, vec2(-0.7), vec2(0.7));
        rd.xy += skew * rd.z;

        vec3 color = vec3(0.0);
        float minT = 1e20;
        float gridScale = max(1e-5, uGridScale);
        float fadeStrength = 2.0;
        vec2 gridUV = vec2(0.0);
        float hitIsY = 1.0;

        for (int i = 0; i < 4; i++) {
            float isY = float(i < 2);
            float pos = mix(-0.2, 0.2, float(i)) * isY + mix(-0.5, 0.5, float(i - 2)) * (1.0 - isY);
            float num = pos - (isY * ro.y + (1.0 - isY) * ro.x);
            float den = isY * rd.y + (1.0 - isY) * rd.x;
            float t = num / den;
            vec3 h = ro + rd * t;
            float depthBoost = smoothstep(0.0, 3.0, h.z);
            h.xy += skew * 0.15 * depthBoost;
            bool use = t > 0.0 && t < minT;
            gridUV = use ? mix(h.zy, h.xz, isY) / gridScale : gridUV;
            minT = use ? t : minT;
            hitIsY = use ? isY : hitIsY;
        }

        vec3 hit = ro + rd * minT;
        float dist = length(hit - ro);

        float jitterAmt = clamp(uLineJitter, 0.0, 1.0);
        if (jitterAmt > 0.0) {
          vec2 j = vec2(sin(gridUV.y * 2.7 + iTime * 1.8), cos(gridUV.x * 2.3 - iTime * 1.6)) * (0.15 * jitterAmt);
          gridUV += j;
        }
        float fx = fract(gridUV.x), fy = fract(gridUV.y);
        float ax = min(fx, 1.0 - fx), ay = min(fy, 1.0 - fy);
        float wx = fwidth(gridUV.x), wy = fwidth(gridUV.y);
        float halfPx = max(0.0, uLineThickness) * 0.5;
        float tx = halfPx * wx, ty = halfPx * wy;
        float aax = wx, aay = wy;

        float lineX = 1.0 - smoothstep(tx, tx + aax, ax);
        float lineY = 1.0 - smoothstep(ty, ty + aay, ay);
        float primaryMask = max(lineX, lineY);

        vec2 gridUV2 = (hitIsY > 0.5 ? hit.xz : hit.zy) / gridScale;
        if (jitterAmt > 0.0) {
          vec2 j2 = vec2(cos(gridUV2.y * 2.1 - iTime * 1.4), sin(gridUV2.x * 2.5 + iTime * 1.7)) * (0.15 * jitterAmt);
          gridUV2 += j2;
        }
        float fx2 = fract(gridUV2.x), fy2 = fract(gridUV2.y);
        float ax2 = min(fx2, 1.0 - fx2), ay2 = min(fy2, 1.0 - fy2);
        float wx2 = fwidth(gridUV2.x), wy2 = fwidth(gridUV2.y);
        float tx2 = halfPx * wx2, ty2 = halfPx * wy2;
        float lineX2 = 1.0 - smoothstep(tx2, tx2 + wx2, ax2);
        float lineY2 = 1.0 - smoothstep(ty2, ty2 + wy2, ay2);
        float altMask = max(lineX2, lineY2);

        float edgeDistX = min(abs(hit.x - (-0.5)), abs(hit.x - 0.5));
        float edgeDistY = min(abs(hit.y - (-0.2)), abs(hit.y - 0.2));
        float edgeDist = mix(edgeDistY, edgeDistX, hitIsY);
        float edgeGate = 1.0 - smoothstep(gridScale * 0.5, gridScale * 2.0, edgeDist);
        altMask *= edgeGate;

        float lineMask = max(primaryMask, altMask);
        float fade = exp(-dist * fadeStrength);

        float dur = max(0.05, uScanDuration), del = max(0.0, uScanDelay);
        float scanZMax = 2.0;
        float widthScale = max(0.1, uScanGlow);
        float sigma = max(0.001, 0.18 * widthScale * uScanSoftness);
        float sigmaA = sigma * 2.0;
        float combinedPulse = 0.0, combinedAura = 0.0;

        float cycle = dur + del;
        float tCycle = mod(iTime, cycle);
        float scanPhase = clamp((tCycle - del) / dur, 0.0, 1.0);
        float phase = scanPhase;
        if (uScanDirection > 1.5) {
          float t2 = mod(max(0.0, iTime - del), 2.0 * dur);
          phase = (t2 < dur) ? (t2 / dur) : (1.0 - (t2 - dur) / dur);
        }
        float scanZ = phase * scanZMax;
        float dz = abs(hit.z - scanZ);
        float lineBand = exp(-0.5 * (dz * dz) / (sigma * sigma));
        float taper = clamp(uPhaseTaper, 0.0, 0.49);
        float headW = taper, tailW = taper;
        float headFade = smoother01(0.0, headW, phase);
        float tailFade = 1.0 - smoother01(1.0 - tailW, 1.0, phase);
        float phaseWindow = headFade * tailFade;
        combinedPulse += lineBand * phaseWindow * clamp(uScanOpacity, 0.0, 1.0);
        float auraBand = exp(-0.5 * (dz * dz) / (sigmaA * sigmaA));
        combinedAura += (auraBand * 0.25) * phaseWindow * clamp(uScanOpacity, 0.0, 1.0);

        for (int i = 0; i < MAX_SCANS; i++) {
          if (float(i) >= uScanCount) break;
          float tActiveI = iTime - uScanStarts[i];
          float phaseI = clamp(tActiveI / dur, 0.0, 1.0);
          if (uScanDirection > 1.5) {
            phaseI = (phaseI < 0.5) ? (phaseI * 2.0) : (1.0 - (phaseI - 0.5) * 2.0);
          }
          float scanZI = phaseI * scanZMax;
          float dzI = abs(hit.z - scanZI);
          float lineBandI = exp(-0.5 * (dzI * dzI) / (sigma * sigma));
          float headFadeI = smoother01(0.0, headW, phaseI);
          float tailFadeI = 1.0 - smoother01(1.0 - tailW, 1.0, phaseI);
          float phaseWindowI = headFadeI * tailFadeI;
          combinedPulse += lineBandI * phaseWindowI * clamp(uScanOpacity, 0.0, 1.0);
          float auraBandI = exp(-0.5 * (dzI * dzI) / (sigmaA * sigmaA));
          combinedAura += (auraBandI * 0.25) * phaseWindowI * clamp(uScanOpacity, 0.0, 1.0);
        }

        color = uLinesColor * lineMask * fade + uScanColor * combinedPulse + uScanColor * combinedAura;
        float n = fract(sin(dot(gl_FragCoord.xy + vec2(iTime * 123.4), vec2(12.9898,78.233))) * 43758.5453123);
        color += (n - 0.5) * uNoise;
        color = clamp(color, 0.0, 1.0);
        float alpha = clamp(max(lineMask, combinedPulse), 0.0, 1.0);
        fragColor = vec4(color, alpha);
    }

    void main(){
      vec4 c;
      mainImage(c, vUv * iResolution.xy);
      gl_FragColor = c;
    }
    `;

    function srgbColor(hex) {
      const c = new THREE.Color(hex);
      return c.convertSRGBToLinear();
    }

    function smoothDampVec2(current, target, vel, smoothTime, maxSpeed, dt) {
      const out = current.clone();
      smoothTime = Math.max(0.0001, smoothTime);
      const omega = 2 / smoothTime;
      const x = omega * dt;
      const exp = 1 / (1 + x + 0.48 * x * x + 0.235 * x * x * x);
      let change = current.clone().sub(target);
      const originalTo = target.clone();
      const maxChange = maxSpeed * smoothTime;
      if (change.length() > maxChange) change.setLength(maxChange);
      target = current.clone().sub(change);
      const temp = vel.clone().addScaledVector(change, omega).multiplyScalar(dt);
      vel.sub(temp.clone().multiplyScalar(omega)).multiplyScalar(exp);
      out.copy(target.clone().add(change.add(temp).multiplyScalar(exp)));
      const origMinusCurrent = originalTo.clone().sub(current);
      if (origMinusCurrent.dot(out.clone().sub(originalTo)) > 0) {
        out.copy(originalTo);
        vel.set(0, 0);
      }
      return out;
    }

    function smoothDampFloat(current, target, velRef, smoothTime, maxSpeed, dt) {
      smoothTime = Math.max(0.0001, smoothTime);
      const omega = 2 / smoothTime;
      const x = omega * dt;
      const exp = 1 / (1 + x + 0.48 * x * x + 0.235 * x * x * x);
      let change = current - target;
      const originalTo = target;
      const maxChange = maxSpeed * smoothTime;
      change = Math.sign(change) * Math.min(Math.abs(change), maxChange);
      target = current - change;
      const temp = (velRef.v + omega * change) * dt;
      velRef.v = (velRef.v - omega * temp) * exp;
      let out = target + (change + temp) * exp;
      if ((originalTo - current) * (out - originalTo) > 0) {
        out = originalTo;
        velRef.v = 0;
      }
      return { value: out, v: velRef.v };
    }

    // ── 初始化 ──
    const container = document.getElementById('gridscan-bg');
    const MAX_SCANS = 8;
    const scanStarts = [];
    let material;

    function pushScan(t) {
      if (scanStarts.length >= MAX_SCANS) scanStarts.shift();
      scanStarts.push(t);
      if (material) {
        const u = material.uniforms;
        const buf = new Array(MAX_SCANS).fill(0);
        for (let i = 0; i < scanStarts.length && i < MAX_SCANS; i++) buf[i] = scanStarts[i];
        u.uScanStarts.value = buf;
        u.uScanCount.value = scanStarts.length;
      }
    }

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.NoToneMapping;
    renderer.autoClear = false;
    renderer.setClearColor(0x000000, 0);
    container.appendChild(renderer.domElement);

    const uniforms = {
      iResolution: { value: new THREE.Vector3(container.clientWidth, container.clientHeight, renderer.getPixelRatio()) },
      iTime: { value: 0 },
      uSkew: { value: new THREE.Vector2(0, 0) },
      uTilt: { value: 0 },
      uYaw: { value: 0 },
      uLineThickness: { value: 1.0 },
      uLinesColor: { value: srgbColor('#2F293A') },
      uScanColor: { value: srgbColor('#A78BFA') },
      uGridScale: { value: 0.1 },
      uLineStyle: { value: 0.0 },
      uLineJitter: { value: 0.1 },
      uScanOpacity: { value: 0.5 },
      uScanDirection: { value: 2.0 },
      uNoise: { value: 0.008 },
      uBloomOpacity: { value: 0.06 },
      uScanGlow: { value: 0.5 },
      uScanSoftness: { value: 2.0 },
      uPhaseTaper: { value: 0.9 },
      uScanDuration: { value: 2.0 },
      uScanDelay: { value: 2.0 },
      uScanStarts: { value: new Array(MAX_SCANS).fill(0) },
      uScanCount: { value: 0 }
    };

    material = new THREE.ShaderMaterial({
      uniforms,
      vertexShader: vert,
      fragmentShader: frag,
      transparent: true,
      depthWrite: false,
      depthTest: false
    });

    const scene = new THREE.Scene();
    const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
    scene.add(new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material));

    // ── 鼠标交互 ──
    const sensitivity = 0.55;
    const s = THREE.MathUtils.clamp(sensitivity, 0, 1);
    const skewScale = THREE.MathUtils.lerp(0.06, 0.2, s);
    const tiltScale = THREE.MathUtils.lerp(0.12, 0.3, s);
    const yawScale = THREE.MathUtils.lerp(0.1, 0.28, s);
    const yBoost = THREE.MathUtils.lerp(1.2, 1.6, s);
    const smoothTime = THREE.MathUtils.lerp(0.45, 0.12, s);
    const maxSpeed = Infinity;

    const lookTarget = new THREE.Vector2(0, 0);
    const lookCurrent = new THREE.Vector2(0, 0);
    const lookVel = new THREE.Vector2(0, 0);
    let tiltTarget = 0, tiltCurrent = 0, tiltVel = { v: 0 };
    let yawTarget = 0, yawCurrent = 0, yawVel = { v: 0 };
    let leaveTimer = null;

    document.addEventListener('mousemove', (e) => {
      if (leaveTimer) { clearTimeout(leaveTimer); leaveTimer = null; }
      const nx = (e.clientX / window.innerWidth) * 2 - 1;
      const ny = -((e.clientY / window.innerHeight) * 2 - 1);
      lookTarget.set(nx, ny);
    });
    document.addEventListener('mouseleave', () => {
      leaveTimer = window.setTimeout(() => {
        lookTarget.set(0, 0);
        tiltTarget = 0; yawTarget = 0;
      }, 250);
    });
    document.addEventListener('click', () => pushScan(performance.now() / 1000));
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 0) {
        const nx = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
        const ny = -((e.touches[0].clientY / window.innerHeight) * 2 - 1);
        lookTarget.set(nx, ny);
      }
    }, { passive: true });
    document.addEventListener('touchend', () => {
      lookTarget.set(0, 0); tiltTarget = 0; yawTarget = 0;
    });
    window.addEventListener('resize', () => {
      renderer.setSize(container.clientWidth, container.clientHeight);
      uniforms.iResolution.value.set(container.clientWidth, container.clientHeight, renderer.getPixelRatio());
    });

    // ── 渲染循环 ──
    let last = performance.now();
    function tick() {
      const now = performance.now();
      const dt = Math.max(0, Math.min(0.1, (now - last) / 1000));
      last = now;
      lookCurrent.copy(smoothDampVec2(lookCurrent, lookTarget, lookVel, smoothTime, maxSpeed, dt));
      const tSm = smoothDampFloat(tiltCurrent, tiltTarget, { v: tiltVel.v }, smoothTime, maxSpeed, dt);
      tiltCurrent = tSm.value; tiltVel.v = tSm.v;
      const ySm = smoothDampFloat(yawCurrent, yawTarget, { v: yawVel.v }, smoothTime, maxSpeed, dt);
      yawCurrent = ySm.value; yawVel.v = ySm.v;
      uniforms.uSkew.value.set(lookCurrent.x * skewScale, -lookCurrent.y * yBoost * skewScale);
      uniforms.uTilt.value = tiltCurrent * tiltScale;
      uniforms.uYaw.value = THREE.MathUtils.clamp(yawCurrent * yawScale, -0.6, 0.6);
      uniforms.iTime.value = now / 1000;
      renderer.clear(true, true, true);
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
    setTimeout(() => pushScan(performance.now() / 1000), 400);
  </script>

  <!-- ═══════════════════════════════════════════
       Spring-Clamp 粒子引擎
       ═══════════════════════════════════════════ -->
  <script>
  (function(){
    const canvas = document.getElementById('particle-bg');
    const ctx = canvas.getContext('2d');
    let W, H, animId;

    function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);

    function springClamp(originalFrom, originalTo, velRef, stiffness, damping) {
      var dt = 1;
      var vel = velRef.v;
      var force = (originalTo - originalFrom) * stiffness;
      vel += force * dt;
      vel *= damping;
      var from = originalFrom + vel * dt;
      if ((from - originalTo) * (originalFrom - originalTo) > 0) {
        from = originalTo;
        vel = 0;
      }
      velRef.v = vel;
      return from;
    }

    function medianPush(buf, v, maxLen) { buf.push(v); if (buf.length > maxLen) buf.shift(); }
    function median(buf) {
      if (buf.length === 0) return 0;
      var a = buf.slice().sort(function(x, y) { return x - y; });
      var mid = Math.floor(a.length / 2);
      return a.length % 2 ? a[mid] : (a[mid - 1] + a[mid]) * 0.5;
    }

    var mouse = { x: -999, y: -999 };
    var particles = [];
    var PARTICLE_COUNT = Math.min(80, Math.floor(W * H / 15000));

    function Particle(resetY) {
      this.reset(resetY);
    }
    Particle.prototype.reset = function(randomY) {
      this.x = Math.random() * W;
      this.y = randomY ? Math.random() * H : (Math.random() > 0.5 ? -10 : H + 10);
      this.size = Math.random() * 1.6 + 0.4;
      this.speedX = (Math.random() - 0.5) * 0.3;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.opacity = Math.random() * 0.45 + 0.15;
      this.velX = { v: 0 };
      this.velY = { v: 0 };
    };
    Particle.prototype.update = function() {
      var dx = mouse.x - this.x;
      var dy = mouse.y - this.y;
      var dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 180) {
        var force = (180 - dist) / 180;
        this.speedX -= dx * force * 0.006;
        this.speedY -= dy * force * 0.006;
      }
      this.speedX += (Math.random() - 0.5) * 0.02;
      this.speedY += (Math.random() - 0.5) * 0.02;
      var maxSpeed = 0.6;
      var spd = Math.sqrt(this.speedX * this.speedX + this.speedY * this.speedY);
      if (spd > maxSpeed) { this.speedX = this.speedX / spd * maxSpeed; this.speedY = this.speedY / spd * maxSpeed; }
      this.x += this.speedX;
      this.y += this.speedY;
      if (this.x < -20 || this.x > W + 20 || this.y < -20 || this.y > H + 20) this.reset();
    };
    Particle.prototype.draw = function() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(167,139,250,' + this.opacity + ')';
      ctx.fill();
    };

    for (var i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle(true));

    function drawLines() {
      for (var i = 0; i < particles.length; i++) {
        for (var j = i + 1; j < particles.length; j++) {
          var dx = particles[i].x - particles[j].x;
          var dy = particles[i].y - particles[j].y;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < 140) {
            var alpha = (1 - dist / 140) * 0.12;
            ctx.beginPath();
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.strokeStyle = 'rgba(167,139,250,' + alpha + ')';
            ctx.lineWidth = 0.5;
            ctx.stroke();
          }
        }
      }
    }

    function render() {
      ctx.clearRect(0, 0, W, H);
      for (var i = 0; i < particles.length; i++) { particles[i].update(); particles[i].draw(); }
      drawLines();
      animId = requestAnimationFrame(render);
    }

    document.addEventListener('mousemove', function(e) { mouse.x = e.clientX; mouse.y = e.clientY; });
    animId = requestAnimationFrame(render);
  })();
  </script>

  <!-- ═══════════════════════════════════════════
       自动加载 & 转场逻辑
       ═══════════════════════════════════════════ -->
  <script>
  (function(){
    var progressBar = document.getElementById('progressBar');
    var transitionMask = document.getElementById('transition-mask');
    var enterBtn = document.getElementById('enterBtn');
    var targetUrl = 'mhc-resume.html';
    var isTransitioning = false;

    // 进度条动画
    var startTime = performance.now();
    var loadDuration = 2500; // 2.5s 加载动画

    function updateProgress() {
      var elapsed = performance.now() - startTime;
      var progress = Math.min(100, (elapsed / loadDuration) * 100);
      progressBar.style.width = progress + '%';
      if (progress < 100) {
        requestAnimationFrame(updateProgress);
      } else {
        // 加载完成，自动进入
        doTransition();
      }
    }
    requestAnimationFrame(updateProgress);

    function doTransition() {
      if (isTransitioning) return;
      isTransitioning = true;
      transitionMask.classList.add('active');
      setTimeout(function() {
        window.location.href = targetUrl;
      }, 800);
    }

    // 点击按钮立即进入
    enterBtn.addEventListener('click', function(e) {
      e.preventDefault();
      if (isTransitioning) return;
      // 立即填满进度条
      progressBar.style.transition = 'width 0.3s ease-out';
      progressBar.style.width = '100%';
      setTimeout(doTransition, 350);
    });
  })();
  </script>
